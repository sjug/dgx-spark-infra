---
- name: Ensure required groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ captured_user_groups[managed_user] | default([managed_user, 'sudo', 'docker']) }}"

- name: Sync managed user group memberships
  ansible.builtin.user:
    name: "{{ managed_user }}"
    groups: "{{ captured_user_groups[managed_user] | default([managed_user, 'sudo', 'docker']) }}"
    append: false
