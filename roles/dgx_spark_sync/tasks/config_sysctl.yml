---
- name: Find captured sysctl configs
  ansible.builtin.find:
    paths: "{{ captured_state_dir }}/etc_sysctl.d"
    patterns: "*.conf"
  delegate_to: localhost
  become: false
  register: sysctl_files

- name: Build set of captured sysctl config names
  ansible.builtin.set_fact:
    captured_sysctl_filenames: >-
      {{ sysctl_files.files | map(attribute='path') | map('basename') | list }}

- name: Find target sysctl configs
  ansible.builtin.find:
    paths: /etc/sysctl.d
    patterns: "*.conf"
    file_type: file
  register: target_sysctl_files

- name: Sync sysctl.d config files
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "/etc/sysctl.d/{{ item.path | basename }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ sysctl_files.files }}"
  notify: reload sysctl

- name: Remove sysctl.d files not present in captured state
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ target_sysctl_files.files }}"
  when: item.path | basename not in captured_sysctl_filenames
  notify: reload sysctl
