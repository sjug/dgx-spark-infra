---
- name: Find captured modprobe configs
  ansible.builtin.find:
    paths: "{{ captured_state_dir }}/etc_modprobe.d"
    patterns: "*.conf"
  delegate_to: localhost
  become: false
  register: modprobe_files

- name: Build set of captured modprobe config names
  ansible.builtin.set_fact:
    captured_modprobe_filenames: >-
      {{ modprobe_files.files | map(attribute='path') | map('basename') | list }}

- name: Find target modprobe configs
  ansible.builtin.find:
    paths: /etc/modprobe.d
    patterns: "*.conf"
    file_type: file
  register: target_modprobe_files

- name: Sync modprobe.d config files
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "/etc/modprobe.d/{{ item.path | basename }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ modprobe_files.files }}"
  notify: update initramfs

- name: Remove modprobe.d files not present in captured state
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ target_modprobe_files.files }}"
  when: item.path | basename not in captured_modprobe_filenames
  notify: update initramfs
