---
name: Validate

"on":
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core>=2.18,<2.21" ansible-lint yamllint
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run validation
        run: make validate
