---
# Example inventory for public release.
# Replace these placeholders with your real hostnames, IPs, and user account.
all:
  children:
    dgx_spark:
      vars:
        ansible_python_interpreter: /usr/bin/python3.12
        ansible_user: admin
      hosts:
        source-node:
          ansible_host: 192.0.2.10
          machine_hostname: source-node
          ib_peer_name: target-node-ib
          peer_host: target-node
          peer_ip: 192.0.2.20
          peer_ib_ip: 198.51.100.20
        target-node:
          ansible_host: 192.0.2.20
          machine_hostname: target-node
          ib_peer_name: source-node-ib
          peer_host: source-node
          peer_ip: 192.0.2.10
          peer_ib_ip: 198.51.100.10

    source_of_truth:
      hosts:
        source-node:

    sync_targets:
      hosts:
        target-node:
